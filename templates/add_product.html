<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Add Product</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #000);
            -webkit-font-smoothing: antialiased;
        }
        .container { padding: 20px; max-width: 500px; margin: 0 auto; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .preview { 
            width: 100%; aspect-ratio: 1; border-radius: 20px; 
            background: #e5e5ea; margin-bottom: 24px; 
            overflow: hidden; position: relative;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .preview img { width: 100%; height: 100%; object-fit: cover; }
        
        .form-group { margin-bottom: 20px; animation: slideUp 0.5s ease backwards; }
        .form-group:nth-child(2) { animation-delay: 0.1s; }
        .form-group:nth-child(3) { animation-delay: 0.2s; }
        .form-group:nth-child(4) { animation-delay: 0.3s; }
        .form-group:nth-child(5) { animation-delay: 0.4s; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        label { display: block; margin-bottom: 10px; font-weight: 600; font-size: 15px; }
        input, textarea, select { 
            width: 100%; padding: 16px; border: 2px solid transparent; 
            border-radius: 14px; font-size: 16px; transition: all 0.2s;
            background: var(--tg-theme-secondary-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
        }
        input:focus, textarea:focus, select:focus { 
            outline: none; 
            border-color: var(--tg-theme-button-color, #007aff);
            transform: scale(1.02);
        }
        textarea { resize: none; height: 80px; font-family: inherit; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="preview" id="preview">
            <img id="img" src="" alt="Product">
        </div>
        
        <form id="form">
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="title" placeholder="e.g. Vintage Denim Jacket" required maxlength="100">
            </div>
            
            <div class="form-group">
                <label>Description</label>
                <textarea id="description" placeholder="Tell customers about this item..."></textarea>
            </div>
            
            <div class="form-group">
                <div class="grid-2">
                    <div>
                        <label>Price (₦)</label>
                        <input type="number" id="price" placeholder="15000" required min="100">
                    </div>
                    <div>
                        <label>Quantity</label>
                        <input type="number" id="quantity" placeholder="5" required min="1">
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label>Available Sizes</label>
                <input type="text" id="sizes" placeholder="S, M, L, XL or One Size" required>
            </div>
        </form>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    tg.setHeaderColor('secondary_bg_color');
    tg.MainButton.setText('PUBLISH PRODUCT').show();
    
    const fileId = "{{ file_id }}";
    
    // Load Telegram image preview
    async function loadImage() {
        try {
            const res = await fetch(`https://api.telegram.org/bot${tg.initDataUnsafe.user?.id}/getFile?file_id=${fileId}`);
            const data = await res.json();
            // Note: This won't work due to bot token. We'll use a placeholder. 
            // In production, you'd proxy this through your backend
            document.getElementById('img').src = 'https://via.placeholder.com/500x500.png?text=Your+Photo';
        } catch (e) {
            document.getElementById('img').src = 'https://via.placeholder.com/500x500.png?text=Product';
        }
    }
    loadImage();

    tg.MainButton.onClick(async () => {
        const data = {
            file_id: fileId,
            title: document.getElementById('title').value.trim(),
            description: document.getElementById('description').value.trim(),
            price: document.getElementById('price').value,
            quantity: document.getElementById('quantity').value,
            sizes: document.getElementById('sizes').value.trim()
        };
        
        if (!data.title || !data.price || !data.quantity || !data.sizes) {
            tg.HapticFeedback.notificationOccurred('error');
            tg.showAlert('Please fill all required fields');
            return;
        }

        tg.MainButton.showProgress();
        tg.MainButton.disable();
        try {
            const res = await fetch('/api/vendor/products/create', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-Telegram-Init-Data': tg.initData
                },
                body: JSON.stringify(data)
            });
            if (!res.ok) throw new Error('Failed');
            tg.HapticFeedback.notificationOccurred('success');
            tg.showAlert('🚀 Product published!', () => tg.close());
        } catch (e) {
            tg.HapticFeedback.notificationOccurred('error');
            tg.showAlert('Error publishing. Try again.');
        } finally {
            tg.MainButton.hideProgress();
            tg.MainButton.enable();
        }
    });
</script>
</body>
  </html>
