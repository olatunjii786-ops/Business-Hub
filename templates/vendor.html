<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vendor Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #0f0f0f);
            color: var(--tg-theme-text-color, #fff);
            -webkit-font-smoothing: antialiased;
        }
        .container { padding: 20px; max-width: 700px; margin: 0 auto; }
        .tabs { display: flex; gap: 8px; margin-bottom: 24px; background: rgba(255,255,255,0.05); padding: 6px; border-radius: 16px; }
        .tab { 
            flex: 1; padding: 12px; border: none; background: transparent; color: rgba(255,255,255,0.6);
            border-radius: 12px; font-weight: 600; font-size: 15px; cursor: pointer; transition: all 0.3s;
        }
        .tab.active { background: #10b981; color: white; }
        .section { display: none; animation: fadeIn 0.3s; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
        .stat { background: rgba(255,255,255,0.05); padding: 16px; border-radius: 16px; text-align: center; }
        .stat-val { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
        .stat-lbl { font-size: 12px; opacity: 0.6; text-transform: uppercase; }
        .card { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 16px; margin-bottom: 12px;
        }
        .card-head { display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px; }
        .card-title { font-weight: 700; font-size: 16px; margin-bottom: 4px; }
        .card-sub { font-size: 13px; opacity: 0.6; }
        .badge { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .badge.paid { background: rgba(16,185,129,0.2); color: #10b981; }
        .badge.delivered { background: rgba(59,130,246,0.2); color: #3b82f6; }
        .badge.off { background: rgba(239,68,68,0.2); color: #ef4444; }
        .badge.on { background: rgba(16,185,129,0.2); color: #10b981; }
        .items { font-size: 14px; margin: 12px 0; }
        .item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .btn { 
            width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: 700;
            font-size: 15px; cursor: pointer; transition: all 0.2s; margin-top: 8px;
        }
        .btn-primary { background: #10b981; color: white; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-ghost { background: rgba(255,255,255,0.1); color: white; }
        .empty { text-align: center; padding: 60px 20px; opacity: 0.4; }
        .empty-icon { font-size: 64px; margin-bottom: 16px; }
        .stock { font-size: 13px; opacity: 0.7; }
        .stock.low { color: #f59e0b; }
        .stock.out { color: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('orders')">Orders</button>
            <button class="tab" onclick="switchTab('products')">Products</button>
            <button class="tab" onclick="switchTab('stats')">Stats</button>
        </div>

        <!-- ORDERS -->
        <div class="section active" id="orders">
            <div id="orders_list"></div>
            <div class="empty" id="orders_empty" style="display:none;">
                <div class="empty-icon">📦</div>
                <div>No orders yet</div>
                <div style="font-size: 13px; margin-top: 8px;">Share your store link to start selling</div>
            </div>
        </div>

        <!-- PRODUCTS -->
        <div class="section" id="products">
            <div id="products_list"></div>
            <div class="empty" id="products_empty" style="display:none;">
                <div class="empty-icon">📸</div>
                <div>No products yet</div>
                <div style="font-size: 13px; margin-top: 8px;">Send me a photo to add your first product</div>
            </div>
        </div>

        <!-- STATS -->
        <div class="section" id="stats">
            <div class="stats">
                <div class="stat">
                    <div class="stat-val" id="stat_sales">₦0</div>
                    <div class="stat-lbl">Total Sales</div>
                </div>
                <div class="stat">
                    <div class="stat-val" id="stat_orders">0</div>
                    <div class="stat-lbl">Orders</div>
                </div>
                <div class="stat">
                    <div class="stat-val" id="stat_products">0</div>
                    <div class="stat-lbl">Products</div>
                </div>
            </div>
        </div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    tg.setHeaderColor('#0f0f0f');

    let currentTab = 'orders';

    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById(tab).classList.add('active');
        currentTab = tab;
        if (tab === 'orders') loadOrders();
        if (tab === 'products') loadProducts();
        if (tab === 'stats') loadStats();
    }

    async function loadOrders() {
        const res = await fetch('/api/vendor/orders', {
            headers: { 'X-Telegram-Init-Data': tg.initData }
        });
        const orders = await res.json();
        const list = document.getElementById('orders_list');
        const empty = document.getElementById('orders_empty');
        
        if (orders.length === 0) {
            list.innerHTML = '';
            empty.style.display = 'block';
            return;
        }
        empty.style.display = 'none';
        
        list.innerHTML = orders.map(o => `
            <div class="card">
                <div class="card-head">
                    <div>
                        <div class="card-title">${o.customer_name}</div>
                        <div class="card-sub">${o.customer_phone} • ${new Date(o.created_at).toLocaleDateString()}</div>
                    </div>
                    <div class="badge ${o.status}">${o.status}</div>
                </div>
                <div class="items">
                    ${o.items.map(i => `<div class="item"><span>${i.quantity}x ${i.title}</span><span>₦${(i.price * i.quantity).toLocaleString()}</span></div>`).join('')}
                </div>
                <div class="card-sub" style="margin: 12px 0;">📍 ${o.delivery_address}</div>
                <div style="display: flex; justify-content: space-between; font-weight: 700; margin: 12px 0;">
                    <span>You Keep:</span>
                    <span style="color: #10b981;">₦${o.you_keep.toLocaleString()}</span>
                </div>
                ${o.status === 'paid' ? `<button class="btn btn-primary" onclick="markDelivered(${o.id})">Mark as Delivered</button>` : ''}
            </div>
        `).join('');
    }

    async function markDelivered(id) {
        tg.HapticFeedback.impactOccurred('medium');
        const res = await fetch(`/api/vendor/orders/${id}/deliver`, {
            method: 'POST',
            headers: { 'X-Telegram-Init-Data': tg.initData }
        });
        if (res.ok) {
            tg.HapticFeedback.notificationOccurred('success');
            loadOrders();
        }
    }

    async function loadProducts() {
        const res = await fetch('/api/vendor/products', {
            headers: { 'X-Telegram-Init-Data': tg.initData }
        });
        const products = await res.json();
        const list = document.getElementById('products_list');
        const empty = document.getElementById('products_empty');
        
        if (products.length === 0) {
            list.innerHTML = '';
            empty.style.display = 'block';
            return;
        }
        empty.style.display = 'none';
        
        list.innerHTML = products.map(p => `
            <div class="card">
                <div class="card-head">
                    <div>
                        <div class="card-title">${p.title}</div>
                        <div class="stock ${p.quantity === 0 ? 'out' : p.quantity < 5 ? 'low' : ''}">
                            Stock: ${p.quantity} ${p.quantity === 0 ? '• Out of stock' : p.quantity < 5 ? '• Low' : ''}
                        </div>
                    </div>
                    <div class="badge ${p.is_active ? 'on' : 'off'}">${p.is_active ? 'ON' : 'OFF'}</div>
                </div>
                <div style="font-size: 20px; font-weight: 800; margin: 12px 0;">₦${p.price.toLocaleString()}</div>
                <button class="btn btn-ghost" onclick="toggleProduct(${p.id})">${p.is_active ? 'Disable' : 'Enable'} Product</button>
            </div>
        `).join('');
    }

    async function toggleProduct(id) {
        tg.HapticFeedback.impactOccurred('light');
        await fetch(`/api/vendor/products/${id}/toggle`, {
            method: 'POST',
            headers: { 'X-Telegram-Init-Data': tg.initData }
        });
        loadProducts();
    }

    async function loadStats() {
        const [ordersRes, productsRes] = await Promise.all([
            fetch('/api/vendor/orders', { headers: { 'X-Telegram-Init-Data': tg.initData } }),
            fetch('/api/vendor/products', { headers: { 'X-Telegram-Init-Data': tg.initData } })
        ]);
        const orders = await ordersRes.json();
        const products = await productsRes.json();
        const totalSales = orders.reduce((sum, o) => sum + o.you_keep, 0);
        document.getElementById('stat_sales').textContent = '₦' + totalSales.toLocaleString();
        document.getElementById('stat_orders').textContent = orders.length;
        document.getElementById('stat_products').textContent = products.length;
    }

    loadOrders();
</script>
</body>
</html>
