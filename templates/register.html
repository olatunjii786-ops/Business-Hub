<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Get Started</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            -webkit-font-smoothing: antialiased;
        }
        .container { padding: 24px 20px; max-width: 500px; margin: 0 auto; }
        .hero { text-align: center; padding: 32px 0 40px 0; }
        .hero-icon { font-size: 64px; margin-bottom: 16px; }
        .hero h1 { font-size: 36px; font-weight: 800; letter-spacing: -1px; margin-bottom: 12px; }
        .hero p { opacity: 0.7; font-size: 17px; line-height: 1.5; }
        .badge { 
            display: inline-block; background: #10b981; color: white; 
            padding: 6px 14px; border-radius: 20px; font-size: 13px; 
            font-weight: 700; margin-bottom: 20px;
        }
        .form-group { margin-bottom: 24px; }
        label { display: block; margin-bottom: 10px; font-weight: 600; font-size: 15px; }
        input, select { 
            width: 100%; padding: 16px; border: 2px solid var(--tg-theme-hint-color, #e5e5ea); 
            border-radius: 14px; font-size: 16px; transition: border 0.2s;
            background: var(--tg-theme-secondary-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            -webkit-appearance: none;
        }
        input:focus, select:focus { 
            outline: none; 
            border-color: var(--tg-theme-button-color, #007aff); 
        }
        .footer { text-align: center; font-size: 13px; opacity: 0.5; margin-top: 32px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <div class="badge">7 DAYS FREE</div>
            <div class="hero-icon">🚀</div>
            <h1>Launch Your Store</h1>
            <p>Keep 100% of sales during trial.<br>No card required to start.</p>
        </div>

        <form id="form">
            <div class="form-group">
                <label>Business Name</label>
                <input type="text" id="business_name" placeholder="e.g. Amara's Fashion Hub" required autocomplete="organization">
            </div>
            
            <div class="form-group">
                <label>WhatsApp Number</label>
                <input type="tel" id="phone_number" placeholder="08012345678" required autocomplete="tel">
            </div>
            
            <div class="form-group">
                <label>Bank for Payouts</label>
                <select id="bank_name" required>
                    <option value="">Choose your bank</option>
                    <option value="Access Bank">Access Bank</option>
                    <option value="GTBank">GTBank</option>
                    <option value="Zenith Bank">Zenith Bank</option>
                    <option value="First Bank">First Bank</option>
                    <option value="UBA">UBA</option>
                    <option value="Kuda Bank">Kuda Bank</option>
                    <option value="Opay">Opay</option>
                    <option value="Palmpay">Palmpay</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Account Number</label>
                <input type="text" id="account_number" placeholder="0123456789" required maxlength="10" pattern="[0-9]{10}">
            </div>
        </form>
        
        <div class="footer">By continuing, you agree to our Terms</div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    tg.setHeaderColor('secondary_bg_color');
    tg.MainButton.setText('START 7-DAY FREE TRIAL').show();
    tg.MainButton.color = '#10b981';

    tg.MainButton.onClick(async () => {
        const data = {
            business_name: document.getElementById('business_name').value.trim(),
            phone_number: document.getElementById('phone_number').value.trim(),
            bank_name: document.getElementById('bank_name').value,
            account_number: document.getElementById('account_number').value.trim()
        };
        
        if (!data.business_name || !data.phone_number || !data.bank_name || data.account_number.length !== 10) {
            tg.HapticFeedback.notificationOccurred('error');
            tg.showAlert('Please fill all fields correctly');
            return;
        }

        tg.MainButton.showProgress();
        tg.MainButton.disable();
        try {
            const res = await fetch(`/api/vendor/register/${tg.initDataUnsafe.user.id}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (!res.ok) throw new Error(await res.text());
            tg.HapticFeedback.notificationOccurred('success');
            tg.showAlert('🎉 Trial activated! Your store is live for 7 days.', () => tg.close());
        } catch (e) {
    tg.HapticFeedback.notificationOccurred('error');
    const errorText = await e.text?.() || 'Registration failed';
    try {
        const errorJson = JSON.parse(errorText);
        tg.showAlert(errorJson.detail || 'Registration failed');
    } catch {
        tg.showAlert('Registration failed. Check your details and try again');
    }
}
        } finally {
            tg.MainButton.hideProgress();
            tg.MainButton.enable();
        }
    });
</script>
</body>
          </html>
