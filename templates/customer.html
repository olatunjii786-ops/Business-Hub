<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Business Hub</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --grad-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --grad-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --grad-4: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            --glass: rgba(255,255,255,0.06);
            --border: rgba(255,255,255,0.12);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(102,126,234,0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(245,87,108,0.1) 0%, transparent 50%);
            animation: bgShift 20s ease infinite;
            z-index: 0;
        }
        @keyframes bgShift { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(-10%, -10%) rotate(180deg); } }

       .container { position: relative; z-index: 1; padding: 20px 16px 100px; max-width: 600px; margin: 0 auto; }
       .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; animation: slideDown 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
       .logo { font-size: 28px; font-weight: 900; letter-spacing: -1px; }
       .header-actions { display: flex; gap: 8px; }
       .icon-btn {
            position: relative;
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
       .icon-btn:active { transform: scale(0.9); }
       .cart-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: var(--grad-2);
            color: white;
            font-size: 12px;
            font-weight: 800;
            min-width: 20px;
            height: 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 6px;
            transform: scale(0);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
       .cart-badge.show { transform: scale(1); }

       .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 4px;
            border-radius: 16px;
            animation: slideDown 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s backwards;
        }
       .tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.5);
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
       .tab.active {
            background: var(--grad-4);
            color: #0a0a0a;
        }

       .search-bar {
            width: 100%;
            padding: 16px 20px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: white;
            font-size: 16px;
            margin-bottom: 20px;
        }
       .search-bar::placeholder { color: rgba(255,255,255,0.4); }

       .vendor-section { margin-bottom: 32px; animation: fadeIn 0.5s backwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
       .vendor-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding: 12px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
        }
       .vendor-avatar {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: var(--grad-1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 800;
        }
       .vendor-info { flex: 1; }
       .vendor-name { font-weight: 700; font-size: 17px; margin-bottom: 2px; }
       .vendor-meta { font-size: 13px; opacity: 0.5; }

       .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
       .product-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
        }
        @keyframes popIn { from { opacity: 0; transform: scale(0.8) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
       .product-card:active { transform: scale(0.96); }
       .product-img {
            width: 100%;
            aspect-ratio: 1;
            background: rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
        }
       .product-img img { width: 100%; height: 100%; object-fit: cover; }
       .product-img-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-size: 48px;
            opacity: 0.2;
        }
       .stock-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 800;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
        }
       .stock-badge.low { color: #facc15; }
       .stock-badge.out { color: #f5576c; }
       .product-info { padding: 12px; }
       .product-title { font-weight: 700; font-size: 15px; margin-bottom: 6px; line-height: 1.2; }
       .product-price { font-size: 18px; font-weight: 900; background: var(--grad-4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

       .empty { text-align: center; padding: 80px 20px; }
       .empty-icon { font-size: 80px; margin-bottom: 20px; animation: bounce 2s ease-in-out infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
       .empty-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
       .empty-text { opacity: 0.5; font-size: 15px; }

       .order-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
        }
       .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
       .order-code { font-size: 15px; font-weight: 800; }
       .order-status {
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
        }
       .status-pending { background: rgba(255,193,7,0.2); color: #facc15; }
       .status-confirmed { background: rgba(16,185,129,0.2); color: #10b981; }
       .status-delivered { background: rgba(139,92,246,0.2); color: #8b5cf6; }
       .status-cancelled { background: rgba(239,68,68,0.2); color: #ef4444; }
       .order-info { font-size: 13px; opacity: 0.7; margin-bottom: 4px; }
       .order-items { font-size: 13px; margin: 12px 0; }
       .order-item { display: flex; justify-content: space-between; margin-bottom: 4px; }
       .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
       .order-total { font-size: 18px; font-weight: 900; color: #43e97b; }
       .cancel-btn {
            padding: 8px 12px;
            border-radius: 8px;
            border: none;
            background: rgba(239,68,68,0.2);
            color: #ef4444;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

       .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0a0a0a;
            z-index: 1000;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            overflow-y: auto;
        }
       .modal.show { transform: translateY(0); }
       .modal-header {
            position: sticky;
            top: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: rgba(10,10,10,0.8);
            backdrop-filter: blur(20px);
            z-index: 10;
        }
       .close-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--glass);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
        }
       .modal-img {
            width: 100%;
            aspect-ratio: 1;
            background: rgba(255,255,255,0.05);
        }
       .modal-img img { width: 100%; height: 100%; object-fit: cover; }
       .modal-content { padding: 20px 16px 100px; }
       .modal-title { font-size: 28px; font-weight: 900; margin-bottom: 8px; }
       .modal-price { font-size: 32px; font-weight: 900; background: var(--grad-4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 16px; }
       .modal-vendor {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin-bottom: 20px;
        }
       .qty-selector {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
        }
       .qty-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--glass);
            border: 1px solid var(--border);
            font-size: 24px;
            font-weight: 700;
            color: white;
            cursor: pointer;
        }
       .qty-value { font-size: 20px; font-weight: 800; min-width: 40px; text-align: center; }
       .modal-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px;
            background: rgba(10,10,10,0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
        }
       .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 16px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
       .btn:active { transform: scale(0.96); }
       .btn-primary { background: var(--grad-4); color: #0a0a0a; box-shadow: 0 4px 20px rgba(67,233,123,0.3); }

       .cart-drawer {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            max-width: 420px;
            background: #0a0a0a;
            z-index: 1001;
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            display: flex;
            flex-direction: column;
        }
       .cart-drawer.show { transform: translateX(0); }
       .cart-header {
            padding: 20px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
       .cart-title { font-size: 24px; font-weight: 900; }
       .cart-items { flex: 1; overflow-y: auto; padding: 16px; }
       .cart-item {
            display: flex;
            gap: 12px;
            padding: 12px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin-bottom: 12px;
        }
       .cart-item-img {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            overflow: hidden;
            flex-shrink: 0;
        }
       .cart-item-img img { width: 100%; height: 100%; object-fit: cover; }
       .cart-item-info { flex: 1; min-width: 0; }
       .cart-item-title { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
       .cart-item-price { font-size: 16px; font-weight: 800; color: #43e97b; }
       .cart-item-qty { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
       .cart-qty-btn {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: var(--glass);
            border: 1px solid var(--border);
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
       .cart-footer {
            padding: 16px;
            border-top: 1px solid var(--border);
        }
       .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 20px;
            font-weight: 900;
            margin-bottom: 16px;
        }
       .checkout-form input,.checkout-form textarea {
            width: 100%;
            padding: 14px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            margin-bottom: 12px;
        }
       .checkout-form input::placeholder,.checkout-form textarea::placeholder { color: rgba(255,255,255,0.4); }

       .backdrop {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
       .backdrop.show { opacity: 1; pointer-events: all; }

       .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--grad-4);
            color: #0a0a0a;
            padding: 14px 24px;
            border-radius: 14px;
            font-weight: 800;
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
       .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

       .order-success {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
       .order-success.show { display: flex; }
       .success-box {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px;
            text-align: center;
            max-width: 400px;
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
       .success-icon { font-size: 72px; margin-bottom: 16px; }
       .order-code {
            font-size: 20px;
            font-weight: 900;
            margin: 16px 0;
            padding: 12px;
            background: rgba(67,233,123,0.1);
            border-radius: 12px;
            word-break: break-all;
        }
       .hidden { display: none!important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">Business Hub</div>
            <div class="header-actions">
                <button class="icon-btn" onclick="openCart()">
                    🛒
                    <div class="cart-badge" id="cart_badge">0</div>
                </button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchMainTab('shop')">Shop</button>
            <button class="tab" onclick="switchMainTab('orders')">My Orders</button>
        </div>

        <div id="shop-section">
            <input type="text" class="search-bar" placeholder="Search products..." id="search_input" oninput="filterProducts()">
            <div id="vendors_list"></div>
            <div class="empty" id="empty_state" style="display:none;">
                <div class="empty-icon">🛍️</div>
                <div class="empty-title">No stores yet</div>
                <div class="empty-text">Be the first vendor to open shop</div>
            </div>
        </div>

        <div id="orders-section" class="hidden">
            <div id="customer-orders-list"></div>
            <div class="empty" id="customer-orders-empty">
                <div class="empty-icon">📦</div>
                <div class="empty-title">No orders yet</div>
                <div class="empty-text">Your orders will appear here</div>
            </div>
        </div>
    </div>

    <div class="modal" id="product_modal">
        <div class="modal-header">
            <div style="font-weight: 700;">Product Details</div>
            <div class="close-btn" onclick="closeModal()">✕</div>
        </div>
        <div class="modal-img" id="modal_img"></div>
        <div class="modal-content">
            <div class="modal-title" id="modal_title"></div>
            <div class="modal-price" id="modal_price"></div>
            <div class="modal-vendor" id="modal_vendor"></div>
            <div class="qty-selector">
                <button class="qty-btn" onclick="changeQty(-1)">−</button>
                <div class="qty-value" id="modal_qty">1</div>
                <button class="qty-btn" onclick="changeQty(1)">+</button>
                <div style="margin-left: auto; opacity: 0.5; font-size: 14px;" id="modal_stock"></div>
            </div>
        <div class="modal-footer">
            <button class="btn btn-primary" onclick="addToCart()">Add to Cart</button>
        </div>
    </div>

    <div class="cart-drawer" id="cart_drawer">
        <div class="cart-header">
            <div class="cart-title">Your Cart</div>
            <div class="close-btn" onclick="closeCart()">✕</div>
        </div>
        <div class="cart-items" id="cart_items"></div>
        <div class="cart-footer" id="cart_footer" style="display:none;">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cart_total">₦0</span>
            </div>
            <div class="checkout-form" id="checkout_form">
                <input type="text" id="cust_name" placeholder="Your Name" required>
                <input type="tel" id="cust_phone" placeholder="Phone Number" required>
                <textarea id="cust_address" placeholder="Delivery Address" rows="2" required></textarea>
                <button class="btn btn-primary" onclick="placeOrder()">Place Order</button>
            </div>
        </div>
        <div class="empty" id="cart_empty" style="display:block;">
            <div class="empty-icon">🛒</div>
            <div class="empty-title">Cart is empty</div>
            <div class="empty-text">Add some products to get started</div>
        </div>
    </div>

    <div class="backdrop" id="backdrop" onclick="closeAll()"></div>
    <div class="toast" id="toast"></div>

    <div class="order-success" id="order_success">
        <div class="success-box">
            <div class="success-icon">🎉</div>
            <h2 style="font-size: 24px; margin-bottom: 12px;">Order Placed!</h2>
            <p style="opacity: 0.7; margin-bottom: 8px;">Contact vendor to complete payment:</p>
            <div id="success_orders"></div>
            <button class="btn btn-primary" onclick="closeSuccess()" style="margin-top: 16px;">Got it</button>
        </div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    tg.setHeaderColor('#0a0a0a');

    let allProducts = [];
    let cart = [];
    let currentProduct = null;
    let currentQty = 1;
    let currentTab = 'shop';

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        tg.HapticFeedback.notificationOccurred('success');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    async function init() {
        try {
            const res = await fetch('/api/vendor/public/products');
            allProducts = await res.json();
            renderVendors();
            loadCart();
        } catch (e) {
            console.error(e);
        }
    }

    function switchMainTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');

        document.getElementById('shop-section').classList.add('hidden');
        document.getElementById('orders-section').classList.add('hidden');
        document.getElementById(`${tab}-section`).classList.remove('hidden');

        if (tab === 'orders') loadCustomerOrders();
    }

    function renderVendors() {
        const list = document.getElementById('vendors_list');
        const empty = document.getElementById('empty_state');

        if (allProducts.length === 0) {
            empty.style.display = 'block';
            return;
        }
        empty.style.display = 'none';

        const vendors = {};
        allProducts.forEach(p => {
            if (!vendors[p.vendor_id]) {
                vendors[p.vendor_id] = {
                    name: p.vendor_name,
                    products: []
                };
            }
            vendors[p.vendor_id].products.push(p);
        });

        list.innerHTML = Object.entries(vendors).map(([id, v], i) => `
            <div class="vendor-section" style="animation-delay: ${i * 0.1}s">
                <div class="vendor-header">
                    <div class="vendor-avatar">${v.name[0].toUpperCase()}</div>
                    <div class="vendor-info">
                        <div class="vendor-name">${v.name}</div>
                        <div class="vendor-meta">${v.products.length} products</div>
                    </div>
                </div>
                <div class="products-grid">
                    ${v.products.map((p, j) => `
                        <div class="product-card" style="animation-delay: ${(i * 0.1) + (j * 0.05)}s" onclick="openProduct(${p.id})">
                            <div class="product-img">
                                ${p.telegram_file_id?
                                    `<img src="/file/${p.telegram_file_id}" alt="${p.title}">` :
                                    `<div class="product-img-placeholder">📦</div>`
                                }
                                ${p.quantity === 0? '<div class="stock-badge out">Out of stock</div>' :
                                  p.quantity < 5? '<div class="stock-badge low">Low stock</div>' : ''}
                            </div>
                            <div class="product-info">
                                <div class="product-title">${p.title}</div>
                                <div class="product-price">₦${p.price.toLocaleString()}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    function filterProducts() {
        const q = document.getElementById('search_input').value.toLowerCase();
        const filtered = allProducts.filter(p =>
            p.title.toLowerCase().includes(q) ||
            p.vendor_name.toLowerCase().includes(q)
        );
        const temp = allProducts;
        allProducts = filtered;
        renderVendors();
        allProducts = temp;
    }

    function openProduct(id) {
        currentProduct = allProducts.find(p => p.id === id);
        if (!currentProduct || currentProduct.quantity === 0) {
            showToast('Out of stock');
            return;
        }
        currentQty = 1;
        document.getElementById('modal_img').innerHTML = currentProduct.telegram_file_id?
            `<img src="/file/${currentProduct.telegram_file_id}" alt="${currentProduct.title}">` :
            `<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:80px;opacity:0.2;">📦</div>`;
                document.getElementById('modal_title').textContent = currentProduct.title;
        document.getElementById('modal_price').textContent = `₦${currentProduct.price.toLocaleString()}`;
        document.getElementById('modal_vendor').innerHTML = `
            <div class="vendor-avatar">${currentProduct.vendor_name[0].toUpperCase()}</div>
            <div><div style="font-weight:700;">${currentProduct.vendor_name}</div></div>
        `;
        document.getElementById('modal_qty').textContent = currentQty;
        document.getElementById('modal_stock').textContent = `${currentProduct.quantity} available`;
        document.getElementById('product_modal').classList.add('show');
        tg.HapticFeedback.impactOccurred('light');
    }

    function closeModal() {
        document.getElementById('product_modal').classList.remove('show');
    }

    function changeQty(delta) {
        const newQty = currentQty + delta;
        if (newQty >= 1 && newQty <= currentProduct.quantity) {
            currentQty = newQty;
            document.getElementById('modal_qty').textContent = currentQty;
            tg.HapticFeedback.selectionChanged();
        }
    }

    function addToCart() {
        if (!currentProduct) return;
        const existing = cart.find(i => i.id === currentProduct.id);
        if (existing) {
            if (existing.qty + currentQty > currentProduct.quantity) {
                showToast('Not enough stock');
                return;
            }
            existing.qty += currentQty;
        } else {
            cart.push({...currentProduct, qty: currentQty});
        }
        saveCart();
        updateCartBadge();
        closeModal();
        showToast('Added to cart');
    }

    function loadCart() {
        const saved = localStorage.getItem('bh_cart');
        if (saved) {
            cart = JSON.parse(saved);
            updateCartBadge();
        }
    }

    function saveCart() {
        localStorage.setItem('bh_cart', JSON.stringify(cart));
    }

    function updateCartBadge() {
        const badge = document.getElementById('cart_badge');
        const count = cart.reduce((sum, i) => sum + i.qty, 0);
        badge.textContent = count;
        if (count > 0) badge.classList.add('show');
        else badge.classList.remove('show');
    }

    function openCart() {
        renderCart();
        document.getElementById('cart_drawer').classList.add('show');
        document.getElementById('backdrop').classList.add('show');
        tg.HapticFeedback.impactOccurred('light');
    }

    function closeCart() {
        document.getElementById('cart_drawer').classList.remove('show');
        document.getElementById('backdrop').classList.remove('show');
    }

    function closeAll() {
        closeModal();
        closeCart();
    }

    function renderCart() {
        const items = document.getElementById('cart_items');
        const footer = document.getElementById('cart_footer');
        const empty = document.getElementById('cart_empty');

        if (cart.length === 0) {
            items.style.display = 'none';
            footer.style.display = 'none';
            empty.style.display = 'block';
            return;
        }

        items.style.display = 'block';
        footer.style.display = 'block';
        empty.style.display = 'none';

        items.innerHTML = cart.map((i, idx) => `
            <div class="cart-item">
                <div class="cart-item-img">
                    ${i.telegram_file_id? `<img src="/file/${i.telegram_file_id}">` : '📦'}
                </div>
                <div class="cart-item-info">
                    <div class="cart-item-title">${i.title}</div>
                    <div class="cart-item-price">₦${(i.price * i.qty).toLocaleString()}</div>
                    <div class="cart-item-qty">
                        <button class="cart-qty-btn" onclick="updateCartQty(${idx}, -1)">−</button>
                        <span style="min-width:30px;text-align:center;font-weight:700;">${i.qty}</span>
                        <button class="cart-qty-btn" onclick="updateCartQty(${idx}, 1)">+</button>
                        <button class="cart-qty-btn" onclick="removeFromCart(${idx})" style="margin-left:auto;">🗑️</button>
                    </div>
                </div>
            </div>
        `).join('');

        const total = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
        document.getElementById('cart_total').textContent = `₦${total.toLocaleString()}`;
    }

    function updateCartQty(idx, delta) {
        cart[idx].qty += delta;
        if (cart[idx].qty <= 0) {
            cart.splice(idx, 1);
        }
        saveCart();
        updateCartBadge();
        renderCart();
        tg.HapticFeedback.selectionChanged();
    }

    function removeFromCart(idx) {
        cart.splice(idx, 1);
        saveCart();
        updateCartBadge();
        renderCart();
        tg.HapticFeedback.notificationOccurred('warning');
    }

    async function placeOrder() {
        const name = document.getElementById('cust_name').value.trim();
        const phone = document.getElementById('cust_phone').value.trim();
        const address = document.getElementById('cust_address').value.trim();

        if (!name || !phone || !address) {
            showToast('Fill all fields');
            tg.HapticFeedback.notificationOccurred('error');
            return;
        }

        if (cart.length === 0) {
            showToast('Cart is empty');
            return;
        }

        tg.HapticFeedback.notificationOccurred('success');

        const orderData = {
            customer_name: name,
            customer_phone: phone,
            delivery_address: address,
            items: cart.map(i => ({ product_id: i.id, quantity: i.qty, price: i.price, size: 'One Size' }))
        };

        try {
            const res = await fetch('/api/checkout', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Telegram-Init-Data': tg.initData
                },
                body: JSON.stringify(orderData)
            });

            if (res.ok) {
                const data = await res.json();
                document.getElementById('success_orders').innerHTML = data.orders.map(o => `
                    <div style="margin-bottom: 16px;">
                        <div style="font-weight: 700; margin-bottom: 8px;">${o.vendor_name}</div>
                        <div class="order-code">${o.order_code}</div>
                        <button class="btn btn-primary" style="margin-top: 12px;"
                                onclick="openWhatsApp('${o.vendor_phone}', '${o.order_code}', ${o.total})">
                            💬 Pay on WhatsApp
                        </button>
                    </div>
                `).join('');
                document.getElementById('order_success').classList.add('show');
                cart = [];
                saveCart();
                updateCartBadge();
                closeCart();
                tg.HapticFeedback.notificationOccurred('success');
            } else {
                const err = await res.json();
                showToast(err.detail || 'Order failed. Try again');
                tg.HapticFeedback.notificationOccurred('error');
            }
        } catch (e) {
            showToast('Network error');
            console.error(e);
            tg.HapticFeedback.notificationOccurred('error');
        }
    }

    function openWhatsApp(phone, orderCode, total) {
        const cleanPhone = phone.replace(/[^0-9]/g, '');
        const msg = `Hi! I just placed order ${orderCode} for ₦${total.toLocaleString()} on Business Hub. How do I pay?`;
        const url = `https://wa.me/${cleanPhone}?text=${encodeURIComponent(msg)}`;
        window.open(url, '_blank');
        tg.HapticFeedback.impactOccurred('medium');
    }

    function closeSuccess() {
        document.getElementById('order_success').classList.remove('show');
    }

    async function loadCustomerOrders() {
        try {
            const res = await fetch('/api/customer/orders', {
                headers: { 'X-Telegram-Init-Data': tg.initData }
            });
            if (!res.ok) return;

            const orders = await res.json();
            const list = document.getElementById('customer-orders-list');
            const empty = document.getElementById('customer-orders-empty');

            if (orders.length === 0) {
                empty.style.display = 'block';
                list.style.display = 'none';
                return;
            }

            empty.style.display = 'none';
            list.style.display = 'block';

            list.innerHTML = orders.map(o => `
                <div class="order-card">
                    <div class="order-header">
                        <div class="order-code">${o.order_code}</div>
                        <div class="order-status status-${o.status}">${o.status.replace('_', ' ')}</div>
                    </div>
                    <div class="order-info">🏪 ${o.vendor_name}</div>
                    <div class="order-items">
                        ${o.items.map(i => `
                            <div class="order-item">
                                <span>${i.title} × ${i.quantity}</span>
                                <span>₦${(i.price * i.quantity).toLocaleString()}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="order-footer">
                        <div class="order-total">₦${o.total_amount.toLocaleString()}</div>
                        ${['pending'].includes(o.status) ? 
                            `<button class="cancel-btn" onclick="cancelOrder(${o.id})">Cancel Order</button>` : ''}
                    </div>
                </div>
            `).join('');
        } catch (e) {
            console.error('loadCustomerOrders error:', e);
        }
    }

    async function cancelOrder(orderId) {
        tg.showConfirm('Cancel this order?', async (confirmed) => {
            if (!confirmed) return;
            try {
                const res = await fetch(`/api/customer/orders/${orderId}/cancel`, {
                    method: 'POST',
                    headers: { 'X-Telegram-Init-Data': tg.initData }
                });
                if (res.ok) {
                    tg.HapticFeedback.notificationOccurred('success');
                    await loadCustomerOrders();
                } else {
                    tg.showAlert('Failed to cancel order');
                }
            } catch (e) {
                tg.showAlert('Network error');
            }
        });
    }

    init();
</script>
</body>
</html>
