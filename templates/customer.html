<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Business Hub</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            -webkit-font-smoothing: antialiased;
        }
      .container { padding: 16px; max-width: 600px; margin: 0 auto; padding-bottom: 80px; }

        /* Header */
      .header {
            margin-bottom: 24px;
            animation: slideDown 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
      .title { font-size: 32px; font-weight: 800; letter-spacing: -1px; margin-bottom: 4px; }
      .subtitle { opacity: 0.5; font-size: 15px; }

        /* Featured Vendors Carousel */
      .featured {
            margin-bottom: 24px;
            overflow: hidden;
            animation: slideDown 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s backwards;
        }
      .featured-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            opacity: 0.5;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }
      .featured-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding-bottom: 8px;
            -webkit-overflow-scrolling: touch;
        }
      .featured-scroll::-webkit-scrollbar { display: none; }
      .vendor-chip {
            flex-shrink: 0;
            scroll-snap-align: start;
            background: linear-gradient(135deg, rgba(102,126,234,0.2), rgba(118,75,162,0.2));
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s;
            animation: slideIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
        }
      .vendor-chip:nth-child(1) { animation-delay: 0.1s; }
      .vendor-chip:nth-child(2) { animation-delay: 0.2s; }
      .vendor-chip:nth-child(3) { animation-delay: 0.3s; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
      .vendor-chip:active { transform: scale(0.96); }
      .vendor-chip.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
      .vendor-logo {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            overflow: hidden;
        }
      .vendor-logo img { width: 100%; height: 100%; object-fit: cover; }
      .vendor-info { min-width: 0; }
      .vendor-name { font-weight: 700; font-size: 14px; white-space: nowrap; }
      .vendor-count { font-size: 12px; opacity: 0.6; }

        /* Search */
      .search {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 14px 18px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideDown 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s backwards;
        }
      .search input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 15px;
            outline: none;
        }
      .search input::placeholder { color: rgba(255,255,255,0.3); }

        /* Product Grid */
      .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
      .product-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: cardPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
        }
        @keyframes cardPop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
      .product-card:active { transform: scale(0.97); }
      .product-img {
            width: 100%;
            aspect-ratio: 1;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            opacity: 0.3;
            overflow: hidden;
        }
      .product-img img { width: 100%; height: 100%; object-fit: cover; opacity: 1; }
      .product-info { padding: 12px; }
      .product-vendor {
            font-size: 11px;
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
      .product-name {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
      .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
      .product-price { font-weight: 900; font-size: 16px; }
      .product-stock {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 8px;
            background: rgba(67,233,123,0.15);
            color: #43e97b;
            font-weight: 700;
        }
      .product-stock.low { background: rgba(250,204,21,0.15); color: #facc15; }

      .empty {
            text-align: center;
            padding: 80px 20px;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      .empty-icon { font-size: 80px; margin-bottom: 20px; opacity: 0.3; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">Business Hub 🛍️</div>
            <div class="subtitle">Discover vendors on Telegram</div>
        </div>

        <div class="featured">
            <div class="featured-title">Featured Stores</div>
            <div class="featured-scroll" id="vendors_list"></div>
        </div>

        <div class="search">
            <span style="opacity: 0.5;">🔍</span>
            <input type="text" placeholder="Search products..." id="search_input">
        </div>

        <div class="grid" id="products_grid"></div>
        <div class="empty" id="empty_state" style="display:none;">
            <div class="empty-icon">🛍️</div>
            <div style="font-weight: 700; font-size: 18px; margin-bottom: 8px;">No products yet</div>
            <div style="opacity: 0.5;">Check back soon for new arrivals</div>
        </div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    tg.setHeaderColor('#0a0a0a');

    let allProducts = [];
    let allVendors = [];
    let activeVendorId = null;

    async function init() {
        await Promise.all([loadVendors(), loadProducts()]);
    }

    async function loadVendors() {
        const res = await fetch('/api/vendor/public/vendors');
        allVendors = await res.json();
        const list = document.getElementById('vendors_list');
        
        const allChip = `
            <div class="vendor-chip ${!activeVendorId? 'active' : ''}" onclick="filterByVendor(null)">
                <div class="vendor-logo">🌟</div>
                <div class="vendor-info">
                    <div class="vendor-name">All Stores</div>
                    <div class="vendor-count">${allVendors.reduce((s,v) => s + v.product_count, 0)} items</div>
                </div>
            </div>
        `;
        
        list.innerHTML = allChip + allVendors.map((v, i) => `
            <div class="vendor-chip ${activeVendorId === v.vendor_id? 'active' : ''}" style="animation-delay: ${(i+1) * 0.1}s" onclick="filterByVendor(${v.vendor_id})">
                <div class="vendor-logo">
                    ${v.logo_file_id?
                        `<img src="/file/${v.logo_file_id}">` :
                        v.business_name[0]
                    }
                </div>
                <div class="vendor-info">
                    <div class="vendor-name">${v.business_name}</div>
                    <div class="vendor-count">${v.product_count} items</div>
                </div>
            </div>
        `).join('');
    }

    async function loadProducts(vendorId = null) {
        const url = vendorId? `/api/vendor/public/products?vendor_id=${vendorId}` : '/api/vendor/public/products';
        const res = await fetch(url);
        allProducts = await res.json();
        renderProducts(allProducts);
    }

    function renderProducts(products) {
        const grid = document.getElementById('products_grid');
        const empty = document.getElementById('empty_state');

        if (products.length === 0) {
            grid.innerHTML = '';
            empty.style.display = 'block';
            return;
        }
        empty.style.display = 'none';

        grid.innerHTML = products.map((p, i) => `
            <div class="product-card" style="animation-delay: ${i * 0.03}s" onclick="viewProduct(${p.id})">
                <div class="product-img">
                    ${p.telegram_file_id?
                        `<img src="/file/${p.telegram_file_id}">` :
                        '📦'
                    }
                </div>
                <div class="product-info">
                    <div class="product-vendor">${p.vendor_name}</div>
                    <div class="product-name">${p.title}</div>
                    <div class="product-footer">
                        <div class="product-price">₦${p.price.toLocaleString()}</div>
                        <div class="product-stock ${p.quantity < 5? 'low' : ''}">${p.quantity} left</div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    window.filterByVendor = function(id) {
        tg.HapticFeedback.impactOccurred('light');
        activeVendorId = id;
        loadProducts(id);
        loadVendors();
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    window.viewProduct = function(id) {
        tg.HapticFeedback.impactOccurred('medium');
        const product = allProducts.find(p => p.id === id);
        tg.showAlert(`${product.title}\n\n₦${product.price.toLocaleString()}\n\nFrom: ${product.vendor_name}\n\nCheckout coming soon — for now DM the vendor`);
    }

    document.getElementById('search_input').addEventListener('input', (e) => {
        const q = e.target.value.toLowerCase();
        const filtered = allProducts.filter(p =>
            p.title.toLowerCase().includes(q) ||
            p.vendor_name.toLowerCase().includes(q)
        );
        renderProducts(filtered);
    });

    init();
</script>
</body>
  </html>
