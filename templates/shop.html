<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --radius: 20px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #000);
            padding-bottom: 90px;
            -webkit-font-smoothing: antialiased;
        }
        .container { padding: 16px; max-width: 600px; margin: 0 auto; }
        .header { padding: 12px 0 24px 0; text-align: center; animation: fadeDown 0.6s ease; }
        @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .header h1 { font-size: 32px; font-weight: 800; letter-spacing: -0.8px; }
        .header p { opacity: 0.6; font-size: 15px; margin-top: 6px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .product { 
            background: var(--tg-theme-secondary-bg-color, #fff);
            border-radius: var(--radius); overflow: hidden; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: cardIn 0.5s ease backwards;
            cursor: pointer;
        }
        @keyframes cardIn { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        
        .product:active { transform: scale(0.95); }
        .product-img { 
            width: 100%; aspect-ratio: 1; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 52px; position: relative; overflow: hidden;
        }
        .product-img img { width: 100%; height: 100%; object-fit: cover; }
        
        .product-body { padding: 14px; }
        .product-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; line-height: 1.3; }
        .product-price { font-size: 17px; font-weight: 800; color: var(--tg-theme-button-color, #007aff); }
        .product-stock { font-size: 12px; opacity: 0.5; margin-top: 4px; }
        
        .cart-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--tg-theme-bg-color, rgba(255,255,255,0.95));
            border-top: 1px solid var(--tg-theme-hint-color, #e5e5ea);
            padding: 16px; display: none; align-items: center; gap: 12px;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            z-index: 100;
        }
        .cart-bar.show { display: flex; }
        .cart-info { flex: 1; }
        .cart-info strong { font-size: 18px; font-weight: 800; }
        .cart-info span { opacity: 0.6; font-size: 13px; display: block; margin-top: 2px; }
        
        .empty { text-align: center; padding: 100px 20px; }
        .empty-icon { font-size: 72px; margin-bottom: 16px; opacity: 0.2; }

        /* Modal styling for sizing options */
        .modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); display: none; align-items: flex-end; z-index: 1000;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: var(--tg-theme-bg-color, #fff); width: 100%;
            border-radius: 24px 24px 0 0; padding: 24px;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 16px; }
        .size-options { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .size-btn {
            border: 1px solid var(--tg-theme-hint-color, #ccc); background: none;
            padding: 8px 16px; border-radius: 10px; color: var(--tg-theme-text-color, #000);
            cursor: pointer; font-weight: 600;
        }
        .size-btn.selected {
            background: var(--tg-theme-button-color, #007aff);
            color: var(--tg-theme-button-text-color, #fff);
            border-color: var(--tg-theme-button-color, #007aff);
        }
        .qty-selector { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
        .qty-btn {
            width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--tg-theme-hint-color, #ccc);
            background: none; font-size: 18px; cursor: pointer; color: var(--tg-theme-text-color, #000);
        }
        .add-to-cart-btn {
            width: 100%; background: var(--tg-theme-button-color, #007aff);
            color: var(--tg-theme-button-text-color, #fff); border: none;
            padding: 14px; border-radius: 14px; font-weight: 700; font-size: 16px; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 id="shopTitle">Marketplace</h1>
        <p>Select products to build your cart</p>
    </div>
    <div id="products" class="grid"></div>
</div>

<div id="cartBar" class="cart-bar">
    <div class="cart-info">
        <strong id="cartTotal">₦0</strong>
        <span id="cartCount">0 items selected</span>
    </div>
</div>

<div id="productModal" class="modal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div id="modalProductTitle" class="modal-title">Select Options</div>
        <div style="font-size: 14px; opacity: 0.6; margin-bottom: 8px;">Size</div>
        <div id="sizeOptions" class="size-options"></div>
        <div style="font-size: 14px; opacity: 0.6; margin-bottom: 8px;">Quantity</div>
        <div class="qty-selector">
            <button class="qty-btn" onclick="updateQty(-1)">-</button>
            <span id="qtyValue" style="font-size: 18px; font-weight: 700;">1</span>
            <button class="qty-btn" onclick="updateQty(1)">+</button>
        </div>
        <button class="add-to-cart-btn" onclick="addToCart()">Add to Bag</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const urlParams = new URLSearchParams(window.location.search);
    const vendorId = urlParams.get('vendor_id') || urlParams.get('tgWebAppStartParam');
    
    let cart = [];
    let productsData = [];
    let selectedProduct = null;
    let selectedSize = 'One Size';
    let selectedQty = 1;

    async function init() {
        try {
            // Adjust public endpoints dynamic check
            const endpoint = vendorId ? `/api/shop/${vendorId}/products` : '/api/marketplace/products';
            const res = await fetch(endpoint);
            if (!res.ok) throw new Error();
            
            const data = await res.json();
            
            if (vendorId) {
                document.getElementById('shopTitle').textContent = data.vendor_name;
                productsData = data.products;
            } else {
                productsData = data;
            }

            renderProducts();
        } catch (e) {
            document.getElementById('products').innerHTML = `
                <div class="empty" style="grid-column: 1/-1;">
                    <div class="empty-icon">🛍️</div>
                    <h3>Store currently unavailable</h3>
                </div>`;
        }
    }

    function renderProducts() {
        const container = document.getElementById('products');
        if (productsData.length === 0) {
            container.innerHTML = `
                <div class="empty" style="grid-column: 1/-1;">
                    <div class="empty-icon">📦</div>
                    <h3>No products available</h3>
                </div>`;
            return;
        }

        container.innerHTML = productsData.map(p => `
            <div class="product" onclick="openProduct(${p.id})">
                <div class="product-img">
                    ${p.telegram_file_id ? `<img src="/file/${p.telegram_file_id}">` : '👕'}
                </div>
                <div class="product-body">
                    <div class="product-title">${p.title}</div>
                    <div class="product-price">₦${p.price.toLocaleString()}</div>
                    <div class="product-stock ${p.quantity <= 3 ? 'low' : ''}">Stock: ${p.quantity}</div>
                </div>
            </div>
        `).join('');
    }

    function openProduct(id) {
        selectedProduct = productsData.find(p => p.id === id);
        if (!selectedProduct) return;

        document.getElementById('modalProductTitle').textContent = selectedProduct.title;
        selectedQty = 1;
        document.getElementById('qtyValue').textContent = selectedQty;

        const sizeContainer = document.getElementById('sizeOptions');
        if (selectedProduct.sizes && selectedProduct.sizes.trim().length > 0) {
            const sizeList = selectedProduct.sizes.split(',').map(s => s.trim());
            selectedSize = sizeList[0];
            sizeContainer.innerHTML = sizeList.map((s, idx) => `
                <button class="size-btn ${idx === 0 ? 'selected' : ''}" onclick="selectSize(this, '${s}')">${s}</button>
            `).join('');
        } else {
            selectedSize = 'One Size';
            sizeContainer.innerHTML = `<button class="size-btn selected" disabled>One Size</button>`;
        }

        document.getElementById('productProductModal');
        document.getElementById('productModal').classList.add('show');
        tg.HapticFeedback.impactOccurred('light');
    }

    function closeModal() {
        document.getElementById('productModal').classList.remove('show');
    }

    function selectSize(btn, size) {
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedSize = size;
        tg.HapticFeedback.impactOccurred('light');
    }

    function updateQty(amt) {
        const newQty = selectedQty + amt;
        if (newQty < 1 || newQty > selectedProduct.quantity) return;
        selectedQty = newQty;
        document.getElementById('qtyValue').textContent = selectedQty;
        tg.HapticFeedback.impactOccurred('light');
    }

    function addToCart() {
        if (!selectedProduct) return;

        const existingItem = cart.find(c => c.product_id === selectedProduct.id && c.size === selectedSize);
        if (existingItem) {
            if (existingItem.quantity + selectedQty > selectedProduct.quantity) {
                tg.showAlert('Cannot add more than available stock');
                return;
            }
            existingItem.quantity += selectedQty;
        } else {
            cart.push({
                product_id: selectedProduct.id,
                title: selectedProduct.title,
                price: selectedProduct.price,
                quantity: selectedQty,
                size: selectedSize
            });
        }

        closeModal();
        updateCart();
        tg.HapticFeedback.notificationOccurred('success');
    }

    function updateCart() {
        const total = cart.reduce((acc, c) => acc + (c.price * c.quantity), 0);
        const count = cart.reduce((acc, c) => acc + c.quantity, 0);

        document.getElementById('cartTotal').textContent = `₦${total.toLocaleString()}`;
        document.getElementById('cartCount').textContent = `${count} item${count > 1 ? 's' : ''} selected`;

        if (count > 0) {
            document.getElementById('cartBar').classList.add('show');
            tg.MainButton.setText('PROCEED TO CHECKOUT');
            tg.MainButton.show();
            tg.MainButton.onClick(checkout);
        } else {
            document.getElementById('cartBar').classList.remove('show');
            tg.MainButton.hide();
        }
    }

    async function checkout() {
    tg.HapticFeedback.impactOccurred('medium');
    const name = prompt('Full name for delivery:');
    if (!name) return;
    const phone = prompt('Phone/WhatsApp number:');
    if (!phone) return;
    const address = prompt('Delivery address:');
    if (!address) return;
    
    tg.MainButton.showProgress();
    try {
        const res = await fetch('/api/checkout', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'X-Telegram-Init-Data': tg.initData // Fixes the 403 Authorization check
            },
            body: JSON.stringify({
                customer_name: name,
                customer_phone: phone,
                delivery_address: address,
                // FALLBACK VALUE: Uses c.id if c.product_id doesn't exist
                items: cart.map(c => ({
                    product_id: c.product_id || c.id, 
                    quantity: c.quantity,
                    size: c.size || 'One Size'
                }))
            })
        });
        
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Checkout failed');
        
        // Dynamic check to prevent app freeze if payment url is mock or missing
        if (data.payment_url && data.payment_url.startsWith('http')) {
            tg.openLink(data.payment_url);
        } else {
            tg.showAlert('Order recorded! Please contact vendor for payment.');
        }

<script>

    tg.expand();

            sizeContainer.innerHTML = `<button class="size-btn selected" disabled>One Size</button>`;
        }

        const existingItem = cart.find(c => c.product_id === selectedProduct.id && c.size === selectedSize);
        if (existingItem) {
            if (existingItem.quantity + selectedQty > selectedProduct.quantity) {
                tg.showAlert('Cannot add more than available stock');

            existingItem.quantity += selectedQty;
        } else {
            cart.push({
                product_id: selectedProduct.id,
                title: selectedProduct.title,
                price: selectedProduct.price,
                quantity: selectedQty,
                size: selectedSize
            });
        }

        closeModal();
        updateCart();
        tg.HapticFeedback.notificationOccurred('success');
    }

    function updateCart() {
        const total = cart.reduce((acc, c) => acc + (c.price * c.quantity), 0);
        const count = cart.reduce((acc, c) => acc + c.quantity, 0);

        document.getElementById('cartTotal').textContent = `₦${total.toLocaleString()}`;
        document.getElementById('cartCount').textContent = `${count} item${count > 1 ? 's' : ''} selected`;

        if (count > 0) {
            document.getElementById('cartBar').classList.add('show');
            tg.MainButton.setText('PROCEED TO CHECKOUT');
            tg.MainButton.show();
            // Clear prior listeners to avoid multiple prompts firing at once
            tg.MainButton.offClick(checkout); 
            tg.MainButton.onClick(checkout);
        } else {
            document.getElementById('cartBar').classList.remove('show');
            tg.MainButton.hide();
        }
    }

    async function checkout() {
        tg.HapticFeedback.impactOccurred('medium');
        const name = prompt('Full name for delivery:');
        if (!name) return;
        const phone = prompt('Phone/WhatsApp number:');
        if (!phone) return;
        const address = prompt('Delivery address:');
        if (!address) return;
        
        tg.MainButton.showProgress();
        try {
            const res = await fetch('/api/checkout', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-Telegram-Init-Data': tg.initData // Fixes 403 authorization checking
                },
                body: JSON.stringify({
                    customer_name: name,
                    customer_phone: phone,
                    delivery_address: address,
                    items: cart.map(c => ({
                        product_id: c.product_id || c.id, 
                        quantity: c.quantity,
                        size: c.size || 'One Size'
                    }))
                })
            });
            
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || 'Checkout failed');
            
            // 1. Paystack routing validation
            if (data.payment_url && data.payment_url.startsWith('http')) {
                tg.openLink(data.payment_url);
            } 
            // 2. Fallback to direct WhatsApp chat distribution routing 
            else if (data.orders && data.orders.length > 0) {
                const targetOrder = data.orders[0];
                const msgText = `Hello, I just placed an order via Business Hub!\n\n*Order Code:* ${targetOrder.order_code}\n*Total Value:* ₦${targetOrder.total.toLocaleString()}\n\nPlease provide payment confirmations details.`;
                const whatsappUrl = `https://wa.me/${targetOrder.vendor_phone}?text=${encodeURIComponent(msgText)}`;
                
                tg.openLink(whatsappUrl);
            } else {
                tg.showAlert('Order recorded! Please contact vendor for payment.');
            }

            // Clean up cache states cleanly on success
            localStorage.removeItem('cart');
            cart = [];
            updateCart();
            
        } catch (e) {
            console.error("Checkout script error:", e);
            tg.showAlert(e.message || 'Checkout failed. Try again.');
        } finally {
            tg.MainButton.hideProgress();
            tg.MainButton.offClick(checkout); // Prevent duplicate tracking traps
        }
    }

    init();
</script>
</body>
</html>
