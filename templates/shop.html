<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --radius: 20px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #000);
            padding-bottom: 90px;
            -webkit-font-smoothing: antialiased;
        }
        .container { padding: 16px; max-width: 600px; margin: 0 auto; }
        .header { padding: 12px 0 24px 0; text-align: center; animation: fadeDown 0.6s ease; }
        @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .header h1 { font-size: 32px; font-weight: 800; letter-spacing: -0.8px; }
        .header p { opacity: 0.6; font-size: 15px; margin-top: 6px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .product { 
            background: var(--tg-theme-secondary-bg-color, #fff);
            border-radius: var(--radius); overflow: hidden; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: cardIn 0.5s ease backwards;
            cursor: pointer;
        }
        .product:nth-child(1) { animation-delay: 0.1s; }
        .product:nth-child(2) { animation-delay: 0.2s; }
        .product:nth-child(3) { animation-delay: 0.3s; }
        .product:nth-child(4) { animation-delay: 0.4s; }
        .product:nth-child(5) { animation-delay: 0.5s; }
        .product:nth-child(6) { animation-delay: 0.6s; }
        @keyframes cardIn { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        
        .product:active { transform: scale(0.95); }
        .product-img { 
            width: 100%; aspect-ratio: 1; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 52px; position: relative; overflow: hidden;
        }
        .product-img img { width: 100%; height: 100%; object-fit: cover; }
        .product-img::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.15), transparent);
            transform: rotate(45deg); animation: shimmer 3s infinite;
        }
        @keyframes shimmer { 0% { transform: translateX(-100%) rotate(45deg); } 100% { transform: translateX(100%) rotate(45deg); } }
        
        .product-body { padding: 14px; }
        .product-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .product-price { font-size: 17px; font-weight: 800; color: var(--tg-theme-button-color, #007aff); }
        .product-stock { font-size: 12px; opacity: 0.5; margin-top: 4px; }
        .product-stock.low { color: #f59e0b; opacity: 1; font-weight: 600; }
        
        .cart-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--tg-theme-bg-color, rgba(255,255,255,0.95));
            border-top: 1px solid var(--tg-theme-hint-color, #e5e5ea);
            padding: 16px; display: none; align-items: center; gap: 12px;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            animation: slideUpBar 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 100;
        }
        @keyframes slideUpBar { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .cart-bar.show { display: flex; }
        .cart-info { flex: 1; }
        .cart-info strong { font-size: 18px; font-weight: 800; }
        .cart-info span { opacity: 0.6; font-size: 13px; display: block; margin-top: 2px; }
        
        .empty { text-align: center; padding: 100px 20px; animation: fadeIn 0.6s ease; }
        .empty-icon { font-size: 72px; margin-bottom: 16px; opacity: 0.2; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 12px; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        .modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); 
            display: none; align-items: flex-end; justify-content: center;
            z-index: 200; animation: fadeIn 0.2s ease;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: var(--tg-theme-bg-color, #fff);
            width: 100%; max-width: 600px; border-radius: 20px 20px 0 0;
            padding: 24px; animation: slideUpModal 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-height: 85vh; overflow-y: auto;
        }
        @keyframes slideUpModal { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-img { width: 100%; aspect-ratio: 1; border-radius: 16px; object-fit: cover; margin-bottom: 16px; }
        .modal-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .modal-price { font-size: 28px; font-weight: 800; color: var(--tg-theme-button-color, #007aff); margin-bottom: 16px; }
        .modal-desc { opacity: 0.7; line-height: 1.5; margin-bottom: 20px; }
        .size-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
        .size-btn { 
            padding: 12px; border: 2px solid var(--tg-theme-hint-color, #e5e5ea);
            border-radius: 12px; background: transparent; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .size-btn.active { 
            background: var(--tg-theme-button-color, #007aff);
            color: var(--tg-theme-button-text-color, #fff);
            border-color: var(--tg-theme-button-color, #007aff);
        }
        .qty-control { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
        .qty-btn { 
            width: 44px; height: 44px; border-radius: 12px; 
            border: none; background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            font-size: 20px; font-weight: 700; cursor: pointer;
        }
        .qty-value { font-size: 20px; font-weight: 700; min-width: 40px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="storeName">Loading...</h1>
            <p>Tap any product to add to cart</p>
        </div>
        <div id="products" class="grid">
            <div class="product">
                <div class="product-img skeleton"></div>
                <div class="product-body">
                    <div class="skeleton" style="height:16px;width:80%;margin-bottom:8px;"></div>
                    <div class="skeleton" style="height:16px;width:40%;"></div>
                </div>
            </div>
            <div class="product">
                <div class="product-img skeleton"></div>
                <div class="product-body">
                    <div class="skeleton" style="height:16px;width:80%;margin-bottom:8px;"></div>
                    <div class="skeleton" style="height:16px;width:40%;"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="cartBar" class="cart-bar">
        <div class="cart-info">
            <strong id="cartTotal">₦0</strong>
            <span id="cartCount">0 items</span>
        </div>
    </div>

    <div id="modal" class="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <img id="modalImg" class="modal-img" src="" alt="">
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-price" id="modalPrice"></div>
            <div class="modal-desc" id="modalDesc"></div>
            <div style="font-weight: 600; margin-bottom: 12px;">Select Size</div>
            <div class="size-grid" id="sizeGrid"></div>
            <div style="font-weight: 600; margin-bottom: 12px;">Quantity</div>
            <div class="qty-control">
                <button class="qty-btn" onclick="changeQty(-1)">−</button>
                <div class="qty-value" id="qtyValue">1</div>
                <button class="qty-btn" onclick="changeQty(1)">+</button>
            </div>
        </div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    tg.setHeaderColor('secondary_bg_color');
    
    const vendorId = window.location.pathname.split('/').pop();
    let cart = [];
    let products = [];
    let selectedProduct = null;
    let selectedSize = null;
    let selectedQty = 1;

    async function init() {
        try {
            const res = await fetch(`/api/shop/${vendorId}/products`);
            if (!res.ok) throw new Error('Shop not found');
            const data = await res.json();
            document.getElementById('storeName').textContent = data.vendor_name;
            products = data.products;
            renderProducts();
        } catch (e) {
            document.getElementById('products').innerHTML = `
                <div class="empty">
                    <div class="empty-icon">😞</div>
                    <strong>Store Unavailable</strong><br>
                    <span style="opacity:0.6">This shop is closed or expired</span>
                </div>`;
        }
    }

    function renderProducts() {
        if (products.length === 0) {
            document.getElementById('products').innerHTML = `
                <div class="empty">
                    <div class="empty-icon">📦</div>
                    <strong>No products yet</strong><br>
                    <span style="opacity:0.6">Check back soon</span>
                </div>`;
            return;
        }
        document.getElementById('products').innerHTML = products.map(p => `
            <div class="product" onclick="openModal(${p.id})">
                <div class="product-img">
                    ${p.telegram_file_id ? '📷' : '🛍️'}
                </div>
                <div class="product-body">
                    <div class="product-title">${p.title}</div>
                    <div class="product-price">₦${p.price.toLocaleString()}</div>
                    <div class="product-stock ${p.quantity < 3 ? 'low' : ''}">${p.quantity} left</div>
                </div>
            </div>
        `).join('');
    }

    function openModal(id) {
        selectedProduct = products.find(p => p.id === id);
        if (!selectedProduct || selectedProduct.quantity === 0) return;
        
        tg.HapticFeedback.impactOccurred('light');
        selectedQty = 1;
        selectedSize = selectedProduct.sizes.split(',')[0].trim();
        
        document.getElementById('modalImg').src = 'https://via.placeholder.com/500x500.png?text=Product';
        document.getElementById('modalTitle').textContent = selectedProduct.title;
        document.getElementById('modalPrice').textContent = `₦${selectedProduct.price.toLocaleString()}`;
        document.getElementById('modalDesc').textContent = selectedProduct.description || 'No description available';
        document.getElementById('qtyValue').textContent = selectedQty;
        
        const sizes = selectedProduct.sizes.split(',').map(s => s.trim());
        document.getElementById('sizeGrid').innerHTML = sizes.map(s => `
            <button class="size-btn ${s === selectedSize ? 'active' : ''}" onclick="selectSize('${s}')">${s}</button>
        `).join('');
        
        document.getElementById('modal').classList.add('show');
        tg.MainButton.setText('Add to Cart').show().onClick(addToCart);
    }

    function closeModal(e) {
        if (e.target.id === 'modal') {
            document.getElementById('modal').classList.remove('show');
            tg.MainButton.hide();
        }
    }

    function selectSize(size) {
        selectedSize = size;
        document.querySelectorAll('.size-btn').forEach(btn => {
            btn.classList.toggle('active', btn.textContent === size);
        });
        tg.HapticFeedback.selectionChanged();
    }

    function changeQty(delta) {
        const newQty = selectedQty + delta;
        if (newQty < 1 || newQty > selectedProduct.quantity) return;
        selectedQty = newQty;
        document.getElementById('qtyValue').textContent = selectedQty;
        tg.HapticFeedback.impactOccurred('light');
    }

    function addToCart() {
        if (!selectedProduct || !selectedSize) return;
        
        tg.HapticFeedback.notificationOccurred('success');
        const existing = cart.find(i => i.product_id === selectedProduct.id && i.size === selectedSize);
        if (existing) {
            existing.quantity += selectedQty;
        } else {
            cart.push({ 
                product_id: selectedProduct.id, 
                quantity: selectedQty, 
                size: selectedSize, 
                price: selectedProduct.price, 
                title: selectedProduct.title 
            });
        }
        updateCart();
        document.getElementById('modal').classList.remove('show');
        tg.MainButton.hide();
    }

    function updateCart() {
        const total = cart.reduce((sum, i) => sum + i.price * i.quantity, 0);
        const count = cart.reduce((sum, i) => sum + i.quantity, 0);
        
        if (count > 0) {
            document.getElementById('cartBar').classList.add('show');
            document.getElementById('cartTotal').textContent = `₦${total.toLocaleString()}`;
            document.getElementById('cartCount').textContent = `${count} item${count > 1 ? 's' : ''}`;
            tg.MainButton.setText(`Checkout ₦${total.toLocaleString()}`).show().onClick(checkout);
        } else {
            document.getElementById('cartBar').classList.remove('show');
            tg.MainButton.hide();
        }
    }

    async function checkout() {
        tg.HapticFeedback.impactOccurred('medium');
        const name = prompt('Full name for delivery:');
        if (!name) return;
        const phone = prompt('Phone/WhatsApp number:');
        if (!phone) return;
        const address = prompt('Delivery address:');
        if (!address) return;
        
        tg.MainButton.showProgress();
        try {
            const res = await fetch('/api/checkout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    vendor_id: parseInt(vendorId),
                    customer_name: name,
                    customer_phone: phone,
                    delivery_address: address,
                    items: cart.map(c => ({
                        product_id: c.product_id,
                        quantity: c.quantity,
                        size: c.size
                    }))
                })
            });
            const data = await res.json();
            tg.openLink(data.payment_url);
            cart = [];
            updateCart();
        } catch (e) {
            tg.showAlert('Checkout failed. Try again.');
        } finally {
            tg.MainButton.hideProgress();
        }
    }

    init();
</script>
</body>
  </html>
