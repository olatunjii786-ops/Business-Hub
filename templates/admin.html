<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Admin Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            color: #fff;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }
        .container { padding: 20px; max-width: 700px; margin: 0 auto; }
        
        .header { margin-bottom: 32px; animation: fadeInDown 0.6s ease; }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .header h1 { font-size: 36px; font-weight: 800; letter-spacing: -1px; background: linear-gradient(135deg, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { opacity: 0.5; font-size: 15px; margin-top: 6px; }
        
        .stats-grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; 
            margin-bottom: 32px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
            padding: 20px; position: relative; overflow: hidden;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: cardSlide 0.6s ease backwards;
        }
        .stat-card:nth-child(1) { animation-delay: 0.1s; }
        .stat-card:nth-child(2) { animation-delay: 0.2s; }
        .stat-card:nth-child(3) { animation-delay: 0.3s; }
        .stat-card:nth-child(4) { animation-delay: 0.4s; }
        @keyframes cardSlide { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
        
        .stat-card:active { transform: scale(0.96); }
        .stat-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, #10b981, #3b82f6);
            animation: gradientMove 3s linear infinite;
        }
        @keyframes gradientMove { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        
        .stat-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.8; }
        .stat-value { font-size: 32px; font-weight: 800; margin-bottom: 4px; }
        .stat-label { font-size: 13px; opacity: 0.6; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .section { animation: fadeIn 0.8s ease 0.4s backwards; }
        .section-title { font-size: 20px; font-weight: 700; margin-bottom: 16px; opacity: 0.9; }
        
        .vendor-item {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px; padding: 16px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            transition: all 0.3s; animation: slideInRight 0.5s ease backwards;
        }
        .vendor-item:nth-child(1) { animation-delay: 0.5s; }
        .vendor-item:nth-child(2) { animation-delay: 0.6s; }
        .vendor-item:nth-child(3) { animation-delay: 0.7s; }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        
        .vendor-item:active { background: rgba(255,255,255,0.06); transform: scale(0.98); }
        .vendor-info strong { font-size: 16px; font-weight: 600; display: block; margin-bottom: 4px; }
        .vendor-info span { font-size: 13px; opacity: 0.5; }
        .badge {
            padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 700;
            background: rgba(16,185,129,0.2); color: #10b981;
        }
        .badge.trial { background: rgba(59,130,246,0.2); color: #3b82f6; }
        .badge.expired { background: rgba(239,68,68,0.2); color: #ef4444; }
        
        .loading { text-align: center; padding: 60px 20px; }
        .spinner {
            width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #10b981; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Control Center</h1>
            <p>Real-time business metrics</p>
        </div>
        
        <div class="stats-grid" id="stats">
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-value" id="total_vendors">-</div>
                <div class="stat-label">Total Vendors</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-value" id="active_vendors">-</div>
                <div class="stat-label">Active Stores</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🎁</div>
                <div class="stat-value" id="on_trial">-</div>
                <div class="stat-label">On Trial</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💰</div>
                <div class="stat-value" id="total_sales">-</div>
                <div class="stat-label">Total Sales</div>
            </div>
        </div>
        
        <div class="section">
            <div class="section-title">Recent Vendors</div>
            <div id="vendors">
                <div class="loading">
                    <div class="spinner"></div>
                    <div style="opacity: 0.5;">Loading vendors...</div>
                </div>
            </div>
        </div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    tg.setHeaderColor('#0f0f0f');

    async function fetchAPI(url) {
        const res = await fetch(url, {
            headers: { 'X-Telegram-Init-Data': tg.initData }
        });
        if (!res.ok) throw new Error('Failed');
        return res.json();
    }

    async function loadStats() {
        try {
            const stats = await fetchAPI('/api/admin/stats');
            
            // Animate numbers counting up
            animateValue('total_vendors', 0, stats.total_vendors, 800);
            animateValue('active_vendors', 0, stats.active_vendors, 800);
            animateValue('on_trial', 0, stats.on_trial, 800);
            
            const salesEl = document.getElementById('total_sales');
            salesEl.textContent = '₦' + stats.total_sales.toLocaleString();
            salesEl.style.animation = 'fadeIn 0.6s ease';
            
            tg.HapticFeedback.notificationOccurred('success');
        } catch (e) {
            tg.showAlert('Failed to load stats');
        }
    }

    function animateValue(id, start, end, duration) {
        const el = document.getElementById(id);
        const range = end - start;
        const increment = range / (duration / 16);
        let current = start;
        const timer = setInterval(() => {
            current += increment;
            if (current >= end) {
                el.textContent = end;
                clearInterval(timer);
            } else {
                el.textContent = Math.floor(current);
            }
        }, 16);
    }

    loadStats();
    setInterval(loadStats, 30000); // Refresh every 30s
</script>
</body>
                    </html>
